[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML pages — edge cache with background revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

# www → apex redirect (Netlify auto-handles HTTP→HTTPS)
[[redirects]]
  from = "https://www.baselayerskin.co/*"
  to = "https://baselayerskin.co/:splat"
  status = 301
  force = true

# Noindex for checkout path (belt-and-suspenders with client-side meta)
[[headers]]
  for = "/checkout"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/checkout/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
